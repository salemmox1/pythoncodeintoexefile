name: "RDP-ARMOUR EXE Builder"

on:
  workflow_dispatch:
    inputs:
      folder_name:
        description: 'Folder name'
        required: true
        default: '.'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pyarmor requests cryptography

      - name: Protect and Compile
        shell: pwsh
        run: |
          # 1. الدخول للمجلد
          if ("${{ github.event.inputs.folder_name }}" -ne ".") { 
              cd "${{ github.event.inputs.folder_name }}" 
          }

          # 2. تحديد الملف (Master_Loader.py)
          $py_file = Get-ChildItem -Filter *.py | Where-Object { $_.Name -like "*Loader*" } | Select-Object -First 1
          if (-not $py_file) { $py_file = Get-ChildItem -Filter *.py | Select-Object -First 1 }
          
          Write-Host ">>> Selected Script: $($py_file.Name)"

          # 3. تشفير الكود (بينتج مجلد اسمه dist جواه الكود المشفر)
          pyarmor gen --private $($py_file.Name)

          # 4. الدخول لمجلد التشفير للبناء من داخله
          cd dist

          # 5. تحديد الأيقونة لو موجودة (نرجع خطوة لورا عشان نشوفها)
          $icon_param = ""
          $icon_file = Get-ChildItem -Path .. -Filter *.ico | Select-Object -First 1
          if ($icon_file) {
              $icon_param = "--icon=`"../$($icon_file.Name)`""
          }

          # 6. البناء النهائي من داخل مجلد التشفير
          # استخدمنا --collect-all لضمان سحب كل ملفات الـ runtime الخاصة بـ pyarmor
          pyinstaller --onefile --noconsole $icon_param --name "RDP_ARMOUR_v1" "$($py_file.Name)"

      - name: Upload Protected EXE
        uses: actions/upload-artifact@v4
        with:
          name: RDP-ARMOUR-v1-EXE
          path: |
            **/dist/dist/*.exe
