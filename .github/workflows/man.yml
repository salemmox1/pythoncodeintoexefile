name: "RDP-ARMOUR EXE Builder"

on:
  workflow_dispatch:
    inputs:
      folder_name:
        description: 'Folder name'
        required: true
        default: '.'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pyarmor requests cryptography

      - name: Protect and Compile
        shell: pwsh
        run: |
          # 1. التشفير العادي في المجلد الحالي
          $py_file = "Master_Loader.py"
          
          if (-not (Test-Path $py_file)) {
              $py_file = Get-ChildItem -Filter *.py | Select-Object -First 1
          }

          Write-Host ">>> Processing: $($py_file)"

          # تشفير بسيط (Obfuscation)
          pyarmor gen $py_file

          # 2. نقل ملف التشفير للمجلد الرئيسي عشان PyInstaller يشوفه
          Copy-Item "dist/$py_file" "./protected_$py_file" -Force
          Copy-Item -Recurse "dist/pyarmor_runtime_*" "./" -ErrorAction SilentlyContinue

          # 3. البناء النهائي (بدون أيقونات وبدون تعقيد)
          # -F يعني OneFile و -w يعني Hidden (No Console)
          pyinstaller --onefile --windowed --name "RDP_ARMOUR" "protected_$py_file"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RDP-ARMOUR-EXE
          path: dist/*.exe
