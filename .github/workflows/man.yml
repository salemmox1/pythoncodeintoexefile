name: "RDP-ARMOUR Final Release"

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag'
        required: true
        default: 'v1.1.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. التحميل المباشر بالـ Token
      - name: Download Artifact
        shell: pwsh
        run: |
          $url = "https://github.com/salemmox1/pythoncodeintoexefile/actions/runs/23713217647/artifacts/6166860719"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" $url -o build.zip

      # 2. فك الضغط بـ 7-Zip (أقوى وأضمن)
      - name: Extract with 7-Zip
        shell: pwsh
        run: |
          # فك الضغط في مجلد اسمه out
          7z x build.zip -o./out -y
          
          # تدوير على الـ EXE وتسميته
          $exe = Get-ChildItem -Path ./out -Filter *.exe -Recurse | Select-Object -First 1
          if ($exe) {
              Copy-Item $exe.FullName "./RDP_ARMOUR.exe" -Force
              Write-Host ">>> RDP_ARMOUR.exe is READY"
          } else {
              Write-Error "EXE not found inside the zip!"
              exit 1
          }

      # 3. الرفع النهائي للريليس
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: "RDP-ARMOUR Engine ${{ github.event.inputs.version_tag }}"
          body: |
            ## 🛡️ RDP-ARMOUR Official Build
            - **File:** RDP_ARMOUR.exe
            - **Build ID:** 6166860719
            - **Status:** Final & Protected ✅
          files: |
            RDP_ARMOUR.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
