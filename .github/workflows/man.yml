name: "RDP-ARMOUR MAX EXE"

on:
  workflow_dispatch:
    inputs:
      folder_name:
        description: 'Folder Name'
        required: true
        default: '.'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pyarmor requests cryptography

      - name: Final Build Engine
        shell: pwsh
        run: |
          # 1. تحديد مكان المجلد والدخول إليه
          $folder = "${{ github.event.inputs.folder_name }}"
          if ($folder -ne ".") { cd $folder }

          # 2. البحث عن الملف والتأكد من وجوده
          $target = Get-ChildItem -Filter *.py | Select-Object -First 1
          if (-not $target) {
              Write-Error "CRITICAL: No Python file found in $folder"
              exit 1
          }
          $script_name = $target.Name
          Write-Host ">>> Target Found: $script_name"

          # 3. التشفير (PyArmor)
          # بنستخدم جينيريت مباشر للملف
          pyarmor gen --private "$script_name"

          # 4. التحقق من وجود مجلد dist قبل النقل
          if (-not (Test-Path "dist")) {
              Write-Error "PyArmor failed to create dist folder!"
              exit 1
          }

          # 5. البناء النهائي باستخدام PyInstaller
          # بنبني من داخل مجلد dist لضمان سحب الـ runtime
          cd dist
          pyinstaller --onefile --windowed --name "RDP_ARMOUR_MAX" "$script_name"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RDP-ARMOUR-MAX-EXE
          path: |
            **/dist/dist/*.exe
