name: "RDP-ARMOUR Final Release"

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag'
        required: true
        default: 'v1.1.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. التحميل المباشر باستخدام curl من الرابط اللي معاك
      - name: Download Artifact Direct
        shell: pwsh
        run: |
          # الرابط اللي أنت ادتهوني من Run #9
          $url = "https://github.com/salemmox1/pythoncodeintoexefile/actions/runs/23713217647/artifacts/6166860719"
          
          Write-Host ">>> Downloading from: $url"
          # استخدام curl لتحميل ملف الـ Zip
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" $url -o build.zip

      # 2. فك الضغط وإعادة التسمية (بدون تعقيد)
      - name: Extract and Rename
        shell: pwsh
        run: |
          # فك ضغط الملف اللي حملناه
          Expand-Archive -Path build.zip -DestinationPath ./out -Force
          
          # تدوير على الـ EXE وتسميته الاسم الجديد
          $exe = Get-ChildItem -Path ./out -Filter *.exe -Recurse | Select-Object -First 1
          if ($exe) {
              Copy-Item $exe.FullName "./RDP_ARMOUR.exe" -Force
              Write-Host ">>> Success: RDP_ARMOUR.exe is ready."
          } else {
              Write-Error "EXE not found in zip!"
              exit 1
          }

      # 3. الرفع في الريليس
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: "RDP-ARMOUR Engine ${{ github.event.inputs.version_tag }}"
          body: |
            ## 🛡️ RDP-ARMOUR Official Build
            - **Name:** RDP_ARMOUR.exe
            - **Status:** Final & Protected
          files: |
            RDP_ARMOUR.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
