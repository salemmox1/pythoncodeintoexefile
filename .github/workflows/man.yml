name: "RDP-ARMOUR EXE Builder"

on:
  workflow_dispatch:
    inputs:
      folder_name:
        description: 'Folder name containing your script'
        required: true
        default: '.' # الوضع الافتراضي هو المجلد الرئيسي

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # نسخة مستقرة للتحويل

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyarmor requests cryptography

      - name: Protect and Compile
        shell: pwsh
        run: |
          $dir = "${{ github.event.inputs.folder_name }}"
          if ($dir -ne ".") { cd $dir }

          # البحث عن ملف السكربت (يفضل تسميته Master_Loader.py)
          $py_file = Get-ChildItem -Filter *.py | Where-Object { $_.Name -like "*Loader*" }
          if (-not $py_file) {
              $py_file = Get-ChildItem -Filter *.py | Select-Object -First 1
          }

          if (-not $py_file) {
              Write-Error "No Python script found to build!"
              exit 1
          }

          Write-Host ">>> Protecting: $($py_file.Name) with PyArmor"
          
          # حماية الكود باستخدام PyArmor
          pyarmor gen --private $($py_file.Name)

          Write-Host ">>> Compiling to EXE with PyInstaller"
          
          # البحث عن أيقونة لو وجدت
          $icon_param = ""
          $icon_file = Get-ChildItem -Filter *.ico | Select-Object -First 1
          if ($icon_file) {
              $icon_param = "--icon=$($icon_file.Name)"
              Write-Host ">>> Using Icon: $($icon_file.Name)"
          }

          # البناء النهائي (بدون كونسول + ملف واحد)
          # ملاحظة: تم إضافة --noconsole لجعل الـ EXE مخفي
          pyinstaller --onefile --noconsole $icon_param --name "RDP_ARMOUR_v1" "$($py_file.Name)"

      - name: Upload Protected EXE
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.folder_name }}-Protected-EXE
          path: |
            **/dist/*.exe
