name: "RDP-ARMOUR Final Release"

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (e.g., v1.1.0)'
        required: true
        default: 'v1.1.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. تحميل الـ Artifact اللي لسه مبني (مهم جداً)
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: RDP-ARMOUR-MAX-EXE
          path: ./downloaded_build

      # 2. فك الضغط وإعادة التسمية
      - name: Extract and Rename
        shell: pwsh
        run: |
          # البحث عن ملف الـ EXE جوه المجلد اللي نزل
          $exe_file = Get-ChildItem -Path ./downloaded_build -Filter *.exe -Recurse | Select-Object -First 1
          
          if ($exe_file) {
              Write-Host ">>> Found EXE: $($exe_file.FullName)"
              # نسخ الملف للمجلد الرئيسي بالاسم الجديد المطلوب
              Copy-Item $exe_file.FullName "./RDP_ARMOUR.exe" -Force
              Write-Host ">>> Renamed to RDP_ARMOUR.exe"
          } else {
              Write-Error "Could not find any EXE in artifact!"
              exit 1
          }

      # 3. إنشاء الريليس ورفع الملف النهائي
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: "RDP-ARMOUR Engine ${{ github.event.inputs.version_tag }}"
          body: |
            ## 🛡️ RDP-ARMOUR Professional Deployment Engine
            
            ### 📝 Status:
            - **Build Status:** Success ✅
            - **Protection:** PyArmor Encrypted 🔒
            - **Deployment:** Ready for C:\ MAX Root
            
            ### 🚀 Highlights:
            - Auto-Renamed to **RDP_ARMOUR.exe**
            - Silent Background Service Enabled.
            - Telegram Live Uptime Reporting.
          files: |
            RDP_ARMOUR.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Final Notification
        run: echo ">>> RDP-ARMOUR is now LIVE in the Release section!"
