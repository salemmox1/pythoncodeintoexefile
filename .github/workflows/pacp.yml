name: QEMU Ultimate Bridge VM (Bore Optimized)
on:
  workflow_dispatch:
    inputs:
      vm_name:
        description: 'VM Name'
        required: true
        default: 'ubuntu-vm'
      vnc_password:
        description: 'VNC Password'
        required: true
        default: 'MR.English2008'
      connection_method:
        description: 'Connection Method'
        required: true
        default: 'bore'
      connection_program:
        description: 'Connection Program (RDP/VNC/NoMachine)'
        required: true
        default: 'VNC'
      vcpus:
        description: 'CPU Cores'
        required: true
        default: '2'
      ram:
        description: 'RAM in GB'
        required: true
        default: '4'
      disk:
        description: 'Disk Size in GB'
        required: true
        default: '20'

jobs:
  run-vm:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FINAL_SOURCE_URL: "https://www.mediafire.com/file/a4qyactev4kzc0q/mint.7z/"
      DISK: ${{ github.event.inputs.disk }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Install Dependencies & Bridge
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf novnc websockify wget curl \
            unzip p7zip-full unrar-free tar python3-pip bridge-utils netcat-openbsd \
            jq tigervnc-viewer wmctrl genisoimage openssh-server ufw
          
          # إعداد الجسر والـ TAP
          sudo brctl addbr br0
          sudo ip addr add 192.168.1.100/24 dev br0
          sudo ip link set br0 up
          sudo ip tuntap add dev tap0 mode tap
          sudo brctl addif br0 tap0
          sudo ip link set tap0 up

      - name: 2. Enable Internet Routing (NAT)
        run: |
          # تفعيل تمرير البيانات لضمان وصول الإنترنت للـ VM
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          sudo iptables -A FORWARD -i br0 -o eth0 -j ACCEPT
          sudo iptables -A FORWARD -i eth0 -o br0 -m state --state RELATED,ESTABLISHED -j ACCEPT

      - name: 3. Setup Bore Tunnel
        run: |
          curl -L https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | tar zx
          sudo mv bore /usr/local/bin/
          echo "CONNECTION_TYPE=Bore" >> $GITHUB_ENV

      - name: 4. Download VM Image
        run: |
          SRC="${{ env.FINAL_SOURCE_URL }}"
          VM="${{ github.event.inputs.vm_name }}"
          sudo mkdir -p /mnt/tmp_unpack
          git clone https://github.com/stck-lzm/badown ~/badown
          chmod +x ~/badown/badown
          cd ~/badown && sudo ./badown "$SRC" > /tmp/badown.log 2>&1 &
          pid=$!
          while kill -0 $pid 2>/dev/null; do sleep 15; echo "Downloading..."; done
          sudo mv $(ls -t | head -n1) /mnt/tmp_unpack/source_file
          cd /mnt/tmp_unpack && sudo 7z x -y source_file
          FOUND=$(find . -type f \( -iname "*.qcow2" -o -iname "*.img" \) | head -n 1)
          sudo mv "$FOUND" "/mnt/${VM}.qcow2"

      - name: 5. Launch QEMU VM
        run: |
          VM="${{ github.event.inputs.vm_name }}"
          VNC_PASS="${{ github.event.inputs.vnc_password }}"
          sudo qemu-system-x86_64 \
            -enable-kvm -cpu host -smp ${{ github.event.inputs.vcpus }} -m ${{ github.event.inputs.ram }}G \
            -hda "/mnt/${VM}.qcow2" -boot c -vnc :0,password=on \
            -monitor tcp:localhost:4444,server,nowait -display none \
            -netdev tap,id=net0,ifname=tap0,script=no,downscript=no \
            -device virtio-net-pci,netdev=net0 \
            -device usb-ehci,id=ehci -device usb-tablet,bus=ehci.0 &
          
          while ! nc -z localhost 4444; do sleep 2; done
          echo "change vnc password $VNC_PASS" | nc -q 1 localhost 4444

      - name: 6. Start Bore Tunnel
        run: |
          PROGRAM="${{ github.event.inputs.connection_program }}"
          PORT=5900
          [ "$PROGRAM" = "RDP" ] && PORT=3389
          [ "$PROGRAM" = "NoMachine" ] && PORT=4000
          
          nohup bore local $PORT --to bore.pub > /tmp/bore.log 2>&1 &
          sleep 10
          TUNNEL_IP=$(grep -Eo 'bore.pub:[0-9]+' /tmp/bore.log | tail -n 1)
          echo "CONNECTION_IP=$TUNNEL_IP" >> $GITHUB_ENV

      - name: 7. Final Info & Keep Alive
        run: |
          echo "Thanks to MR.English2008"
          echo "Connection Type: Bore"
          echo "Address: ${{ env.CONNECTION_IP }}"
          echo "--- NETWORK SETUP COMMANDS FOR VM ---"
          echo "sudo ip addr add 192.168.1.10/24 dev ens3"
          echo "sudo ip link set ens3 up"
          echo "sudo ip route add default via 192.168.1.100"
          echo "echo 'nameserver 8.8.8.8' | sudo tee /etc/resolv.conf"
          sleep 21600
