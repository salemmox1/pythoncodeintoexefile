name: WiFi Hash Multi-Converter

on:
  push:
    paths:
      - '**.txt'
      - '**.pcap'
  workflow_dispatch:

jobs:
  convert-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y hcxtools libcurl4-openssl-dev libssl-dev zlib1g-dev

      - name: Process and Convert Files
        run: |
          mkdir -p output_hashes
          
          # البحث عن الملفات وتحويلها
          for f in *; do
            # التأكد من أن الملف ينتهي بـ .txt أو .pcap
            if [[ "$f" == *.txt ]] || [[ "$f" == *.pcap ]]; then
              echo "Processing: $f"
              
              # تحويل الملف إلى hc22000 (الصيغة الأساسية والحديثة)
              # هذه الأداة موجودة ضمن hcxtools التي قمنا بتثبيتها
              hcxpcapngtool -o "output_hashes/${f%.*}.hc22000" "$f" || echo "Failed to extract hash from $f"
            fi
          done

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: wifi-hashes
          path: output_hashes/
